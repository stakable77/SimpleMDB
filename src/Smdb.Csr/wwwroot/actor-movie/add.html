<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<title>Add Actor–Movie Link • Simple Movie Database</title>
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link rel="stylesheet" href="/styles/main.css" />
	<script type="module" src="/scripts/actor-movies/add.js" defer></script>
</head>

<body>
	<header>
		<h1>Add Actor–Movie Link</h1>
		<nav>
			<ul>
				<li><a href="/" class="btn">Home</a></li>
				<li><a href="/actor-movie/index.html" class="btn">All Links</a></li>
			</ul>
		</nav>
	</header>
	<main class="container">
		<div id="status" class="status">Loading...</div>
		<form id="am-form" class="grid">
			<div class="field">
				<label for="actorId">Actor</label>
				<select id="actorId" name="actorId" required></select>
			</div>
			<div class="field">
				<label for="movieId">Movie</label>
				<select id="movieId" name="movieId" required></select>
			</div>
			<div class="form-actions">
				<button class="btn primary" type="submit">Create</button>
				<a class="btn" href="/actor-movie/index.html">Cancel</a>
			</div>
		</form>
	</main>
</body>

</html>
