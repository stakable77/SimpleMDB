<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<title>Add User • Simple Movie Database</title>
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link rel="stylesheet" href="/styles/main.css" />
	<script type="module" src="/scripts/users/add.js" defer></script>
</head>

<body>
	<header>
		<h1>Add User</h1>
		<nav>
			<ul>
				<li><a href="/" class="btn">Home</a></li>
				<li><a href="/users/index.html" class="btn">All Users</a></li>
			</ul>
		</nav>
	</header>
	<main class="container">
		<div id="status" class="status">Loading...</div>
		<form id="user-form" class="grid">
			<div class="field">
				<label for="name">Name</label>
				<input id="name" name="name" type="text" required />
			</div>
			<div class="field">
				<label for="email">Email</label>
				<input id="email" name="email" type="email" required />
			</div>
			<div class="form-actions">
				<button class="btn primary" type="submit">Create</button>
				<a class="btn" href="/users/index.html">Cancel</a>
			</div>
		</form>
	</main>
</body>

</html>
